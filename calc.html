<!DOCTYPE html>
<html>
<head>
    <title>CGPA Calculator</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
 }
.top img{
    border-radius: 50%;
    margin-right: 10px;
    height: 60px;
    width: 60px;
    object-fit: cover;
}
.top{
    display: flex;
    align-items: center;
    gap: 10px;
}
body{
    
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;

}
       /* Navbar */
nav{
    background:#111827;
    padding:15px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap: wrap;
}

nav h1{
    color:white;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

nav ul li a:hover{
    color:#38bdf8;
}
.calc{
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.subject{
    justify-content: center;
    display: flex;
}
h2 {
    margin-bottom: 20px;
    }

.card {
            width: 450px;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
         }

input {
            padding: 8px;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
    }

        button {
            padding: 12px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .add-btn {
            background-color: #4e73df;
            color: white;
        }

        .calc-btn {
            background-color: #66ff00;
            color: rgb(2, 1, 1);
            width: 100%;
        }

        footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
    </style>
</head>

<body>
    <nav>
        <div class="top">
            <img src="hanuman-render-close-up-4k-hd-3d-ahhiyo7dqfbi8muk.jpg" alt="img">
            <h1>Gyansetu</h1>
        </div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#notes">Notes</a></li>
        <li><a href="#pyq.html">PYQ</a></li>
        <li><a href="#contact.html">Contact</a></li>
    </ul>
    </nav><br>

<section class="calc">
    <div class="card">
    <h2>CGPA Calculator</h2>
    <div id="subjects">
        <div class="subject" id="subject">
            <input type="number" placeholder="Credit" class="credit">
            <input type="number" placeholder="Grade Point" class="grade">
        </div>
    </div>

    <button class="add-btn" onclick="addSubject()">+ Add Subject</button>
    <button class="calc-btn" onclick="calculateCGPA()">Calculate CGPA</button>

    <div class="result" id="result"></div>
</div>
</section>


<script>
    function addSubject() {
        let div = document.createElement("div");
        div.className = "subject";
        div.innerHTML = `
            <input type="number" placeholder="Credit" class="credit">
            <input type="number" placeholder="Grade Point" class="grade">
        `;
        document.getElementById("subjects").appendChild(div);
    }

    function calculateCGPA() {
        let credits = document.getElementsByClassName("credit");
        let grades = document.getElementsByClassName("grade");

        let totalCredits = 0;
        let totalPoints = 0;

        for (let i = 0; i < credits.length; i++) {
            let credit = parseFloat(credits[i].value);
            let grade = parseFloat(grades[i].value);

            if (!isNaN(credit) && !isNaN(grade)) {
                totalCredits += credit;
                totalPoints += credit * grade;
            }
        }

        if (totalCredits === 0) {
            document.getElementById("result").innerText = "Please enter valid data!";
        } else {
            let cgpa = totalPoints / totalCredits;
            document.getElementById("result").innerText = "Your CGPA is: " + cgpa.toFixed(2);
        }
    }
</script>

<br><br><hr><br>
<footer>

</footer>
</body>
</html>
